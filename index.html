<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DB — Site</title>

    <!-- Preload heroes -->
    <link rel="preload" as="image" href="./dbai.png" media="(min-width: 769px)" />
    <link rel="preload" as="image" href="./dbmobile.png" media="(max-width: 768px)" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Baloo+2:wght@400;600;700&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        html {
            scroll-behavior: smooth
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Baloo 2', system-ui, -apple-system, Segoe UI, Roboto, Inter, Helvetica, Arial, sans-serif
        }

        :root {
            --edge: clamp(16px, 4vw, 28px);
            --row: clamp(18px, 2.4vw, 28px);
            --radius: 18px;

            /* Pastel blue/purple */
            --p-blue: #b9c8ff;
            --p-blue-2: #8fa6ff;
            --p-purple: #e1ccff;
            --p-purple-2: #c19bff;
            --border: rgba(189, 200, 255, .25);
            --ink: #0b0d16;
            --surface: #0f1118;
            --chip: #14151c;
            --glow: 0 0 0 2px rgba(185, 200, 255, .18);
        }

        /* HERO */
        .hero {
            position: relative;
            min-height: 100svh;
            background: center 30%/cover no-repeat url("./dbai.png");
            overflow: hidden
        }

        @media (max-width:768px) {
            .hero {
                background-image: url("./dbmobile.png");
                background-position: center 38%
            }
        }

        .brand {
            position: absolute;
            top: max(var(--edge), env(safe-area-inset-top));
            left: max(var(--edge), env(safe-area-inset-left));
            z-index: 6;
            display: flex;
            gap: 10px;
            align-items: center;
            filter: drop-shadow(0 6px 18px rgba(0, 0, 0, .55))
        }

        .brand img {
            height: clamp(22px, 5vw, 40px);
            display: block
        }

        .brand .word {
            display: none;
            font-family: 'Permanent Marker', system-ui;
            font-size: clamp(22px, 5vw, 40px);
            letter-spacing: .02em;
            text-shadow: 0 2px 0 rgba(0, 0, 0, .35), 1px 0 0 var(--ink), -1px 0 0 var(--ink), 0 1px 0 var(--ink), 0 -1px 0 var(--ink)
        }

        .brand img[style*="display: none"]+.word {
            display: block
        }

        .bottom {
            position: absolute;
            left: 0;
            right: 0;
            bottom: max(var(--edge), env(safe-area-inset-bottom));
            padding: 0 var(--edge);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: var(--row);
            z-index: 2
        }

        @media (max-width:768px) {
            .bottom {
                display: grid;
                grid-template-columns: 1fr auto;
                align-items: end
            }
        }

        .menu {
            display: flex;
            gap: clamp(12px, 4.5vw, 36px);
            font-family: 'Permanent Marker', system-ui;
            text-transform: uppercase;
            letter-spacing: .02em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, .35)
        }

        .menu a,
        .menu button {
            color: #fff;
            background: transparent;
            border: 0;
            cursor: pointer;
            padding: .15em .05em;
            border-radius: .15em;
            text-decoration: none;
            box-shadow: inset 0 -2px 0 rgba(255, 255, 255, 0);
            transition: box-shadow .12s, transform .12s
        }

        .menu a:hover,
        .menu button:hover {
            box-shadow: inset 0 -6px 0 rgba(185, 200, 255, .35);
            transform: translateY(-1px)
        }

        @media (max-width:768px) {
            .menu {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start
            }
        }

        .socials {
            display: flex;
            gap: 16px;
            align-items: center
        }

        .socials a {
            display: inline-flex;
            width: 1.35em;
            height: 1.35em;
            color: #fff;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, .45));
            opacity: .95;
            transition: transform .12s, opacity .12s
        }

        .socials a:hover {
            transform: scale(1.06);
            opacity: 1
        }

        @media (max-width:768px) {
            .socials {
                flex-direction: column;
                gap: 12px;
                align-items: flex-end
            }
        }

        .icon {
            width: 100%;
            height: 100%;
            display: block
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .28);
            opacity: 0;
            pointer-events: none;
            transition: opacity .15s;
            z-index: 3
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto
        }

        /* PAGES (shows) */
        .page {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .88);
            display: none;
            z-index: 5;
            padding: calc(var(--edge) + env(safe-area-inset-top)) var(--edge) var(--edge);
            overflow: hidden
        }

        .page.show {
            display: block
        }

        .close {
            position: absolute;
            top: max(var(--edge), env(safe-area-inset-top));
            left: var(--edge);
            background: transparent;
            border: 0;
            color: #fff;
            cursor: pointer;
            font-family: 'Permanent Marker', system-ui;
            font-size: clamp(20px, 3vw, 28px)
        }

        .title {
            margin: 0 0 12px;
            text-align: center;
            font-family: 'Permanent Marker', system-ui;
            text-transform: uppercase;
            letter-spacing: .02em;
            font-size: clamp(32px, 7vw, 72px);
            text-shadow: 0 3px 0 rgba(0, 0, 0, .45), 1px 0 0 var(--ink), -1px 0 0 var(--ink), 0 1px 0 var(--ink), 0 -1px 0 var(--ink)
        }

        .scroll {
            height: calc(100svh - (var(--edge) + env(safe-area-inset-top)) - var(--edge));
            overflow: auto;
            padding-top: 8px
        }

        .btn {
            --a: var(--p-blue);
            --b: var(--p-purple);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: linear-gradient(135deg, var(--a), var(--b));
            color: #0e0b16;
            text-decoration: none;
            font-family: 'Permanent Marker', system-ui;
            font-size: 18px;
            letter-spacing: .02em;
            box-shadow: var(--glow), 0 10px 24px rgba(0, 0, 0, .35);
            transition: transform .12s, filter .12s, box-shadow .12s
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: var(--glow), 0 14px 28px rgba(0, 0, 0, .45)
        }

        /* Shows cards */
        .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(3, minmax(0, 1fr))
        }

        @media (max-width:1100px) {
            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr))
            }
        }

        @media (max-width:640px) {
            .grid {
                grid-template-columns: 1fr
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 10px 22px rgba(0, 0, 0, .45)
        }

        .thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            background: #111
        }

        @media (max-width:640px) {
            .thumb {
                aspect-ratio: 4/5
            }
        }

        .body {
            padding: 12px 14px 14px
        }

        .top {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center
        }

        .badge {
            background: var(--chip);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 13px;
            line-height: 1;
            box-shadow: var(--glow)
        }

        .h3 {
            margin: 10px 0 4px;
            font-family: 'Permanent Marker', system-ui;
            letter-spacing: .02em;
            text-transform: uppercase;
            font-size: 26px;
            line-height: 1
        }

        .meta {
            opacity: .9;
            font-size: 14px
        }

        .actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap
        }

        /* ========== HIGHLIGHTS (4 boxes) ========== */
        .section {
            padding: 72px var(--edge)
        }

        .section h2 {
            margin: 0 0 16px;
            text-align: center;
            font-family: 'Permanent Marker', system-ui;
            text-transform: uppercase;
            letter-spacing: .02em;
            font-size: clamp(28px, 6vw, 60px);
            text-shadow: 0 3px 0 rgba(0, 0, 0, .45), 1px 0 0 var(--ink), -1px 0 0 var(--ink), 0 1px 0 var(--ink), 0 -1px 0 var(--ink)
        }

        .mosaic {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            grid-auto-rows: 240px;
            max-width: 1200px;
            margin: 0 auto
        }

        .tile {
            position: relative;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, #0f1118, #0e1118);
            box-shadow: 0 12px 24px rgba(0, 0, 0, .45);
            overflow: hidden
        }

        .tile h3 {
            margin: 0 0 8px;
            font-family: 'Permanent Marker', system-ui;
            font-size: clamp(22px, 4.5vw, 34px)
        }

        .tile p {
            margin: 0 0 10px;
            opacity: .9
        }

        /* layout */
        .t1 {
            grid-column: 1 / span 7;
            grid-row: 1 / span 2
        }

        /* Pictures big left */
        .t2 {
            grid-column: 8 / span 5;
            grid-row: 1 / span 1
        }

        /* Reviews full tile */
        .t3 {
            grid-column: 8 / span 5;
            grid-row: 2 / span 2
        }

        /* Reels tall right */
        .t4 {
            grid-column: 1 / span 7;
            grid-row: 3 / span 1
        }

        /* About square left bottom */
        @media (max-width:900px) {
            .mosaic {
                grid-template-columns: repeat(6, minmax(0, 1fr));
                grid-auto-rows: 210px
            }

            .t1,
            .t2,
            .t3,
            .t4 {
                grid-column: 1 / span 6;
                grid-row: auto
            }
        }

        /* Pictures: clean image */
        .pic-wrap {
            position: absolute;
            inset: 0;
            padding: 18px
        }

        .pic {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: var(--glow)
        }

        /* Reviews: full-tile card (image left) */
        .review {
            position: absolute;
            inset: 18px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            display: grid;
            grid-template-columns: 64px 1fr;
            gap: 12px;
            align-items: center;
            box-shadow: var(--glow)
        }

        .review img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border)
        }

        .stars {
            display: flex;
            gap: 4px;
            margin: 6px 0
        }

        .stars svg {
            width: 18px;
            height: 18px;
            fill: #ffd166;
            filter: drop-shadow(0 1px 0 rgba(0, 0, 0, .3))
        }

        .r-name {
            font-weight: 700
        }

        .r-text {
            opacity: .95
        }

        /* Reels: video fills the whole container */
        .t3 .short {
            position: absolute;
            inset: 18px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            background: #000;
            box-shadow: var(--glow)
        }

        .t3 .short iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block
        }

        /* soften bottom-right to de-emphasize watermark */
        .t3 .wm-mask {
            position: absolute;
            right: 18px;
            bottom: 18px;
            width: 120px;
            height: 120px;
            background: radial-gradient(100px 100px at bottom right, rgba(0, 0, 0, .55), transparent 70%);
            pointer-events: none
        }

        /* About: text only, clean square */
        .about-only {
            position: absolute;
            inset: 18px;
            display: flex;
            align-items: center
        }

        .about-only h3 {
            margin: 0 0 6px
        }

        .about-only p {
            margin: 0;
            max-width: 70ch
        }

        /* Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(18px) scale(.98);
            transition: 600ms ease
        }

        .reveal.in {
            opacity: 1;
            transform: none
        }
    </style>
</head>

<body>

    <!-- HERO -->
    <header class="hero">
        <a class="brand" href="/" aria-label="Home">
            <img src="./db-logo.svg" alt="David Burrows logo"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span class="word">DB</span>
        </a>

        <div class="bottom">
            <nav class="menu" aria-label="Primary">
                <a href="#shows">Shows</a>
                <a href="#highlights">Highlights</a>
                <button id="contactBtn">Contact</button>
            </nav>
            <div class="socials" aria-label="Socials">
                <a href="https://www.instagram.com/dbcomedy14/" target="_blank" rel="noopener" aria-label="Instagram">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                        <circle cx="12" cy="12" r="4" />
                        <circle cx="18" cy="6" r="1" />
                    </svg>
                </a>
                <a href="https://www.tiktok.com/@dbcomedy14?_t=ZT-8yjyCl2pKnu&_r=1" target="_blank" rel="noopener"
                    aria-label="TikTok">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12.8 3a6.6 6.6 0 0 0 4.9 2.1V8A9.3 9.3 0 0 1 14 6.7v6.7a5.4 5.4 0 1 1-5.4-5.4c.3 0 .7 0 1 .1V10a2.9 2.9 0 1 0 2 2.7V3h1.2Z" />
                    </svg>
                </a>
            </div>
        </div>

        <div id="overlay" class="overlay" aria-hidden="true"></div>

        <!-- Shows overlay -->
        <div id="showsPage" class="page" aria-label="Shows">
            <button class="close" id="closeShows">← Back</button>
            <h2 class="title">Shows</h2>
            <div class="scroll">
                <div id="showsGrid" class="grid" aria-live="polite"></div>
            </div>
        </div>
    </header>

    <!-- ========== HIGHLIGHTS (4 boxes) ========== -->
    <section class="section" id="highlights">
        <h2>Highlights</h2>
        <div class="mosaic">
            <!-- Pictures -->
            <article class="tile t1 reveal" aria-label="Pictures">
                <div class="pic-wrap"><img class="pic" src="./db.png" alt="David on stage"></div>
            </article>

            <!-- Reviews (full tile, image left, no button) -->
            <article class="tile t2 reveal" aria-label="Review">
                <div class="review">
                    <img src="./db.png" alt="Reviewer avatar" onerror="this.src='./dbai.png'">
                    <div>
                        <div class="r-name">Club Booker • NYC</div>
                        <div class="stars" aria-hidden="true">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 17.3 5.9 21l1.2-7-5.1-4.9 7-.9L12 1.5l3.1 6.7 7 .9-5.1 4.9 1.2 7z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path d="M12 17.3 5.9 21l1.2-7-5.1-4.9 7-.9L12 1.5l3.1 6.7 7 .9-5.1 4.9 1.2 7z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path d="M12 17.3 5.9 21l1.2-7-5.1-4.9 7-.9L12 1.5l3.1 6.7 7 .9-5.1 4.9 1.2 7z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path d="M12 17.3 5.9 21l1.2-7-5.1-4.9 7-.9L12 1.5l3.1 6.7 7 .9-5.1 4.9 1.2 7z" />
                            </svg>
                            <svg viewBox="0 0 24 24">
                                <path d="M12 17.3 5.9 21l1.2-7-5.1-4.9 7-.9L12 1.5l3.1 6.7 7 .9-5.1 4.9 1.2 7z" />
                            </svg>
                        </div>
                        <div class="r-text">“Crowd loved him — clean, quick, and knows how to work a room.”</div>
                    </div>
                </div>
            </article>

            <!-- Reels (video fills tile, autoplay/mute/loop, no controls) -->
            <article class="tile t3 reveal" aria-label="Reel">
                <div class="short">
                    <iframe
                        src="https://www.youtube.com/embed/ds_Sg2BIWs4?autoplay=1&mute=1&controls=0&rel=0&playsinline=1&modestbranding=1&loop=1&playlist=ds_Sg2BIWs4"
                        title="YouTube Short" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                        allow="autoplay; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen></iframe>
                </div>
                <div class="wm-mask" aria-hidden="true"></div>
            </article>

            <!-- About Me (text only) -->
            <article class="tile t4 reveal" aria-label="About Me">
                <div class="about-only">
                    <div>
                        <h3>About Me</h3>
                        <p>David Burrows is a high-energy comedian mixing crowd-work, storytelling, and sharp one-liners
                            around the tri-state area.</p>
                    </div>
                </div>
            </article>
        </div>
    </section>

    <script>
        /* Overlay for shows */
        const overlay = document.getElementById('overlay');
        const showsPage = document.getElementById('showsPage');
        document.querySelector('.menu a[href="#shows"]').addEventListener('click', e => {
            e.preventDefault(); showsPage.classList.add('show'); overlay.classList.add('show');
        });
        document.getElementById('closeShows').addEventListener('click', () => { showsPage.classList.remove('show'); overlay.classList.remove('show'); });
        overlay.addEventListener('click', () => { showsPage.classList.remove('show'); overlay.classList.remove('show'); });

        /* Contact quick modal (simple) */
        document.getElementById('contactBtn').addEventListener('click', e => {
            e.preventDefault();
            alert('Text: +1 732 395 1102\nEmail: antmoreno1000@gmail.com\nDM: @anthonymoreno__');
        });

        /* Shows data */
        const shows = [
            { id: 'DNbGpTKRzhJ', date: 'TBA', city: '—', venue: '—', link: 'https://www.instagram.com/reel/DNbGpTKRzhJ/', thumb: './thumbs/DNbGpTKRzhJ.jpg' },
            { id: 'DHPMztypBsl', date: 'TBA', city: '—', venue: '—', link: 'https://www.instagram.com/reel/DHPMztypBsl/', thumb: './thumbs/DHPMztypBsl.jpg' },
            { id: 'DEkwPnmRckD', date: 'TBA', city: '—', venue: '—', link: 'https://www.instagram.com/reel/DEkwPnmRckD/', thumb: './thumbs/DEkwPnmRckD.jpg' },
        ];
        const grid = document.getElementById('showsGrid');
        grid.innerHTML = shows.map(s => `
      <article class="card">
        <a href="${s.link}" target="_blank" rel="noopener"><img class="thumb" src="${s.thumb}" alt="Show ${s.id}" loading="lazy"></a>
        <div class="body">
          <div class="top">
            <span class="badge">${s.date || 'TBA'}</span>
            <span class="badge">${s.city || '—'}</span>
            <span class="badge">${s.venue || '—'}</span>
          </div>
          <div class="h3">Live Set</div>
          <div class="meta">Tap to watch the reel</div>
          <div class="actions">
            <a class="btn" href="${s.link}" target="_blank" rel="noopener">Watch</a>
            <a class="btn" style="--a:var(--p-purple);--b:var(--p-blue-2)" href="https://www.instagram.com/anthonymoreno__/" target="_blank" rel="noopener">Book</a>
          </div>
        </div>
      </article>
    `).join('');

        /* Reveal on scroll */
        const io = new IntersectionObserver((es) => {
            es.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
        }, { threshold: .12 });
        document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    </script>
</body>

</html>
